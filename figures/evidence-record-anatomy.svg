<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Evidence records form a knowledge graph</title>
  <desc id="desc">Existing data, software, protocols, and figures remain in their authoritative repositories. A proposed evidence record links those objects and related evidence records while adding study context, contributor attribution, and lifecycle state. The evidence-to-evidence links form a knowledge graph, and one persistent identifier resolves to both a human-readable landing page and a machine-readable manifest.</desc>
  <defs>
    <style>
      text { font-family: Avenir, Helvetica, Arial, sans-serif; fill: #19323c; }
      .title { font-size: 28px; font-weight: 800; }
      .subtitle { font-size: 15px; fill: #4d6268; }
      .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.8px; fill: #4d6268; }
      .panel-title { font-size: 19px; font-weight: 800; }
      .card-title { font-size: 14px; font-weight: 800; }
      .small { font-size: 12px; fill: #4d6268; }
      .panel { fill: #ffffff; stroke: #c8d2d3; stroke-width: 1.5; }
      .manifest { fill: #ffffff; stroke: #19323c; stroke-width: 3; }
      .card { stroke: #19323c; stroke-width: 1.5; }
      .flow { stroke: #60767c; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60767c"/>
    </marker>
  </defs>

  <rect width="1040" height="560" rx="8" fill="#ffffff"/>
  <text x="40" y="48" class="title">Evidence records form a knowledge graph</text>
  <text x="40" y="76" class="subtitle">Each record links authoritative research objects and related evidence, then resolves for people and machines.</text>

  <rect class="panel" x="40" y="110" width="250" height="400" rx="8"/>
  <text x="60" y="140" class="eyebrow">EXISTING REPOSITORIES</text>
  <text x="60" y="168" class="panel-title">Authoritative objects</text>
  <text x="60" y="190" class="small">Stay where they are</text>

  <rect class="card" x="60" y="225" width="100" height="62" rx="6" fill="#dce9e1"/>
  <text x="110" y="252" text-anchor="middle" class="card-title">Data</text>
  <text x="110" y="274" text-anchor="middle" class="small">DOI / accession</text>
  <rect class="card" x="170" y="225" width="100" height="62" rx="6" fill="#f4dfbc"/>
  <text x="220" y="252" text-anchor="middle" class="card-title">Software</text>
  <text x="220" y="274" text-anchor="middle" class="small">release</text>
  <rect class="card" x="60" y="305" width="100" height="62" rx="6" fill="#dce9e1"/>
  <text x="110" y="332" text-anchor="middle" class="card-title">Protocol</text>
  <text x="110" y="354" text-anchor="middle" class="small">version</text>
  <rect class="card" x="170" y="305" width="100" height="62" rx="6" fill="#f4dfbc"/>
  <text x="220" y="332" text-anchor="middle" class="card-title">Figure</text>
  <text x="220" y="354" text-anchor="middle" class="small">recipe</text>
  <text x="165" y="462" text-anchor="middle" class="small">Repositories remain authoritative.</text>

  <path class="flow" d="M296 310 L332 310"/>
  <text x="314" y="292" text-anchor="middle" class="small">links</text>

  <rect class="manifest" x="340" y="110" width="360" height="400" rx="8"/>
  <text x="360" y="140" class="eyebrow">PROPOSED PROFILE</text>
  <text x="360" y="168" class="panel-title">Evidence record</text>
  <text x="360" y="190" class="small">Citable without a claim · persistent identifier</text>

  <rect class="card" x="360" y="220" width="320" height="54" rx="6" fill="#f7f8f6"/>
  <text x="520" y="240" text-anchor="middle" class="eyebrow">CONTEXT</text>
  <text x="520" y="260" text-anchor="middle" class="small">design · variables · uncertainty · QC</text>

  <rect class="card" x="360" y="289" width="320" height="54" rx="6" fill="#cfe2ec"/>
  <text x="520" y="309" text-anchor="middle" class="eyebrow">OBJECT LINKS</text>
  <text x="520" y="329" text-anchor="middle" class="small">data · software · protocol · figure</text>

  <rect class="card" x="360" y="358" width="320" height="54" rx="6" fill="#cfe2ec"/>
  <text x="520" y="378" text-anchor="middle" class="eyebrow">EVIDENCE LINKS</text>
  <text x="520" y="398" text-anchor="middle" class="small">derived from · replicates · extends</text>

  <rect class="card" x="360" y="427" width="320" height="54" rx="6" fill="#e2dced"/>
  <text x="520" y="447" text-anchor="middle" class="eyebrow">CREDIT + STATE</text>
  <text x="520" y="467" text-anchor="middle" class="small">ORCID · roles · version · status</text>

  <path class="flow" d="M706 310 L742 310"/>
  <text x="724" y="292" text-anchor="middle" class="small">resolves</text>

  <rect class="panel" x="750" y="110" width="250" height="400" rx="8"/>
  <text x="770" y="140" class="eyebrow">ONE IDENTIFIER</text>
  <text x="770" y="168" class="panel-title">Human + machine</text>
  <text x="770" y="190" class="small">Two views of the same record</text>

  <rect class="card" x="770" y="235" width="210" height="78" rx="6" fill="#f7f8f6"/>
  <text x="875" y="266" text-anchor="middle" class="card-title">Landing page</text>
  <text x="875" y="290" text-anchor="middle" class="small">readable summary</text>
  <rect class="card" x="770" y="335" width="210" height="78" rx="6" fill="#cfe2ec"/>
  <text x="875" y="366" text-anchor="middle" class="card-title">Machine manifest</text>
  <text x="875" y="390" text-anchor="middle" class="small">JSON-LD / RO-Crate</text>
  <text x="875" y="462" text-anchor="middle" class="small">Both cite the same record.</text>
</svg>